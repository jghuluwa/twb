# Therabo — production compose stack.
#
# Usage:
#   1. Copy .env.example to .env and fill in the real values
#   2. `docker compose up -d --build`
#   3. First start automatically seeds: 16 products + 1 admin user + default content
#
# The "app" service listens on 8080 inside the network. Nginx terminates
# TLS and proxies to it. SQLite + uploaded images live in named volumes
# so `docker compose down` does NOT wipe data.

services:
  app:
    build: .
    container_name: therabo-app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "8080"
      DB_DIR: /app/data
      UPLOAD_DIR: /app/uploads
      STATIC_DIR: /app/public
    volumes:
      - therabo-data:/app/data
      - therabo-uploads:/app/uploads
    expose:
      - "8080"
    command: sh -c "node dist/seed.js && node dist/index.js"

  nginx:
    image: nginx:1.27-alpine
    container_name: therabo-nginx
    restart: unless-stopped
    depends_on: [app]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/letsencrypt:ro

volumes:
  therabo-data:
  therabo-uploads:
