# Therabo — production Nginx config.
#
# This file is loaded by the nginx container in docker-compose.yml. Replace
# YOUR_DOMAIN_HERE with your real domain before going live and obtain TLS
# certs (see DEPLOY.md "HTTPS" section).
#
# Until you have HTTPS, you can comment out the 443 server block and keep
# everything proxied through :80 — it will still work, just unencrypted.

# HTTP → HTTPS redirect (uncomment after certs are in place)
# server {
#   listen 80;
#   server_name YOUR_DOMAIN_HERE;
#   return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;
    client_max_body_size 12M;   # allow product photo uploads (10MB + headers)

    # Stripe webhooks need the raw body — make sure no buffering interferes.
    location /api/payments/stripe/webhook {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Static SPA + everything else
    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        gzip on;
        gzip_types text/css application/javascript application/json image/svg+xml;
    }
}

